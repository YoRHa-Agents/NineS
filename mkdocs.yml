site_name: "NineS"
site_description: "Multi-vertex evaluation, collection, analysis, and self-iteration system for AI agents"
site_url: "https://yorha-agents.github.io/NineS/"
repo_url: "https://github.com/YoRHa-Agents/NineS"
repo_name: "YoRHa-Agents/NineS"

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode / 切换暗色模式"
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: "Switch to light mode / 切换亮色模式"
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  language: en
  custom_dir: docs/overrides

extra_css:
  - stylesheets/nier.css
  - stylesheets/home.css

plugins:
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          theme:
            language: zh
          nav_translations:
            Home: 首页
            Getting Started: 快速入门
            Quick Start: 快速开始
            Installation: 安装指南
            Agent Skill Setup: 智能体技能配置
            User Guide: 用户指南
            Overview: 概述
            Evaluation (V1): 评估 (V1)
            Collection (V2): 采集 (V2)
            Analysis (V3): 分析 (V3)
            Self-Iteration: 自迭代
            CLI Reference: CLI 参考
            Showcase: 示例展示
            "Caveman Analysis": Caveman 仓库分析
            Architecture: 系统架构
            System Overview: 系统概述
            Module Design: 模块设计
            Self-Evaluation Dimensions: 自评估维度
            Design Documents: 设计文档
            Architecture Design: 架构设计
            Capability Model: 能力模型
            Evaluation Framework: 评估框架
            Analysis Engine: 分析引擎
            Sandbox Design: 沙箱设计
            Self-Evaluation Spec: 自评估规范
            Self-Iteration Design: 自迭代设计
            Information Pipeline: 信息管道
            Skill Adapter: 技能适配器
            Skill Interface Spec: 技能接口规范
            Requirements: 需求文档
            Research: 研究
            Synthesis Report: 综合报告
            External Frameworks: 外部框架
            Domain Knowledge: 领域知识
            EvoBench Analysis: EvoBench 分析
            EvoBench Migration: EvoBench 迁移
            GSD Analysis: GSD 分析
            Agent Repo Analysis: AI 仓库分析方法
            Development: 开发
            Contributing: 贡献指南
            Development Plan: 开发计划
            Roadmap: 路线图
            Growth Evaluation Plan: 成长评估计划
            V2 Iteration Plan: V2 迭代计划
            Changelog: 变更日志
            Review Findings: 评审发现
            Code Review: 代码评审
            MVP Acceptance: MVP 验收
            About: 关于
            Design Philosophy: 设计理念
            Evaluation Criteria: 评估标准
            API Reference: API 参考
  - search
  - macros:
      module_name: docs/hooks/version_hook

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  nines_version: "0.4.0"
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YoRHa-Agents/NineS

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quick-start.md
    - Installation: installation.md
    - Agent Skill Setup: agent-skill-setup.md
  - User Guide:
    - Overview: user-guide/index.md
    - Evaluation (V1): user-guide/evaluation.md
    - Collection (V2): user-guide/collection.md
    - Analysis (V3): user-guide/analysis.md
    - Self-Iteration: user-guide/self-iteration.md
    - CLI Reference: user-guide/cli-reference.md
  - Showcase:
    - Overview: showcase/index.md
    - "Caveman Analysis": showcase/caveman-analysis.md
  - Architecture:
    - System Overview: architecture/overview.md
    - Module Design: architecture/modules.md
    - Self-Evaluation Dimensions: architecture/self-eval-dimensions.md
    - Design Documents:
      - Architecture Design: design/architecture.md
      - Capability Model: design/capability_model.md
      - Evaluation Framework: design/eval_framework.md
      - Analysis Engine: design/analysis_engine.md
      - Sandbox Design: design/sandbox_design.md
      - Self-Evaluation Spec: design/self_eval_spec.md
      - Self-Iteration Design: design/self_iteration.md
      - Information Pipeline: design/info_pipeline.md
      - Skill Adapter: design/skill_adapter.md
      - Skill Interface Spec: design/skill_interface_spec.md
      - Requirements: design/requirements.md
    - Research:
      - Synthesis Report: research/synthesis_report.md
      - External Frameworks: research/external_frameworks.md
      - Domain Knowledge: research/domain_knowledge.md
      - EvoBench Analysis: research/evobench_analysis.md
      - EvoBench Migration: research/evobench_migration_patterns.md
      - GSD Analysis: research/gsd_analysis.md
      - Agent Repo Analysis: research/agent_repo_analysis.md
  - Development:
    - Contributing: development/contributing.md
    - Development Plan: development/plan.md
    - Roadmap: development/roadmap.md
    - Growth Evaluation Plan: roadmap/growth_evaluation_plan.md
    - V2 Iteration Plan: roadmap/v2_iteration_plan.md
    - Changelog: changelog.md
    - Review Findings: design/review_findings.md
    - Code Review: review/code_review_findings.md
    - MVP Acceptance: validation/mvp_acceptance.md
  - About:
    - Design Philosophy: design-philosophy.md
    - Evaluation Criteria: evaluation-criteria.md
  - API Reference: api-reference.md
