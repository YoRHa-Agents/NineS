site_name: "NineS"
site_description: "Multi-vertex evaluation, collection, analysis, and self-iteration system for AI agents"
site_url: "https://yorha-agents.github.io/NineS/"
repo_url: "https://github.com/YoRHa-Agents/NineS"
repo_name: "YoRHa-Agents/NineS"

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode / 切换暗色模式"
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: "Switch to light mode / 切换亮色模式"
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  language: en

extra_css:
  - stylesheets/nier.css

plugins:
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
  - search
  - macros:
      module_name: docs/hooks/version_hook

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YoRHa-Agents/NineS
  alternate:
    - name: English
      link: /
      lang: en
    - name: 中文
      link: /zh/
      lang: zh

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quick-start.md
    - Installation: installation.md
    - Agent Skill Setup: agent-skill-setup.md
  - User Guide:
    - Overview: user-guide/index.md
    - Evaluation (V1): user-guide/evaluation.md
    - Collection (V2): user-guide/collection.md
    - Analysis (V3): user-guide/analysis.md
    - Self-Iteration: user-guide/self-iteration.md
    - CLI Reference: user-guide/cli-reference.md
  - Architecture:
    - System Overview: architecture/overview.md
    - Module Design: architecture/modules.md
    - Self-Evaluation Dimensions: architecture/self-eval-dimensions.md
  - Development:
    - Contributing: development/contributing.md
    - Roadmap: development/roadmap.md
  - About:
    - Design Philosophy: design-philosophy.md
    - Evaluation Criteria: evaluation-criteria.md
  - API Reference: api-reference.md
